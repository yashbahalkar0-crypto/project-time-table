databases:
  - name: chronotable-db
    databaseName: chronotable
    user: chronotable

services:
  - type: web
    name: chronotable-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm run cloud:start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: chronotable-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: NODE_ENV
        value: production
      - key: ALLOW_VERCEL_PREVIEWS
        value: true
      - key: SEED_DEMO_DATA
        value: true
