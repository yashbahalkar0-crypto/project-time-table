version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: timetable-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: chronotable
      POSTGRES_PASSWORD: chronotable123
      POSTGRES_DB: chronotable
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: timetable-backend
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgresql://chronotable:chronotable123@db:5432/chronotable
      JWT_SECRET: your-super-secret-jwt-key-change-in-production
      JWT_EXPIRES_IN: 7d
      PORT: 4000
      NODE_ENV: production
      CORS_ORIGIN: http://localhost:3000
    depends_on:
      - db
    command: >
      sh -c "npx prisma db push && npx prisma db seed && npm start"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: timetable-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      BACKEND_URL: http://backend:4000
    depends_on:
      - backend

volumes:
  pgdata:
